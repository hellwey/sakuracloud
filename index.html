<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 SAKURA_CLOUD_V1.4 🌸</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --sakura: #ffb7c5; --white: #fffaff; --text: #7c585e; --active: #ff69b4; --delete: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--white); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .version-tag { position: fixed; top: 10px; right: 10px; font-size: 10px; background: var(--active); color: white; padding: 3px 8px; border-radius: 10px; z-index: 100; font-weight: bold; }

        .player-card { background: white; width: 95%; max-width: 500px; margin: 40px 0 20px; padding: 25px; border-radius: 35px; border: 4px solid var(--sakura); box-shadow: 0 10px 30px rgba(255,183,197,0.3); text-align: center; position: relative; }

        input, select { width: 100%; padding: 12px; border: 2px solid var(--sakura); border-radius: 15px; margin-bottom: 10px; outline: none; font-size: 16px; background: white; color: var(--text); }

        .add-section { background: #fff5f7; padding: 15px; border-radius: 25px; margin-bottom: 20px; border: 1px dashed var(--sakura); }

        .add-btn { background: var(--sakura); color: white; padding: 15px; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; width: 100%; transition: 0.2s; }
        .add-btn:active { background: var(--active); transform: scale(0.95); }

        .controls-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .stats { font-size: 12px; opacity: 0.7; margin-bottom: 10px; text-align: left; padding-left: 5px; }

        audio { width: 100%; margin: 15px 0; }

        .playlist { width: 100%; max-height: 300px; overflow-y: auto; text-align: left; padding-right: 5px; }
        /* Стилизация скроллбара */
        .playlist::-webkit-scrollbar { width: 5px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--sakura); border-radius: 10px; }

        .track { padding: 12px; border-radius: 15px; background: #fffafb; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 2px solid transparent; transition: 0.2s; }
        .track.playing { border-color: var(--active); background: #fff0f5; color: var(--active); font-weight: bold; }
        
        .track-info { flex-grow: 1; cursor: pointer; display: flex; align-items: center; font-size: 14px; overflow: hidden; }
        .track-info span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 5px; margin-left: 10px; }
        .del-btn:hover { color: var(--delete); }

        .petal { position: fixed; background: var(--sakura); border-radius: 150% 0 150% 0; z-index: 1; animation: fall linear infinite; opacity: 0.4; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="version-tag">VER 1.4 (SORT_UPDATE)</div>
<div id="sakura-container"></div>

<div class="player-card">
    <h1>🌸 SAKURA CLOUD</h1>
    
    <div class="add-section">
        <input type="text" id="trackName" placeholder="Название трека...">
        <input type="text" id="trackUrl" placeholder="Прямая ссылка (.mp3)...">
        <button class="add-btn" onclick="addTrack()">ОПУБЛИКОВАТЬ ☁️</button>
    </div>

    <div class="controls-row">
        <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="updateUI()" style="margin-bottom:0; flex: 2;">
        <select id="sortSelect" onchange="updateUI()" style="margin-bottom:0; flex: 1;">
            <option value="new">Новые</option>
            <option value="az">А-Я</option>
        </select>
    </div>

    <div class="stats" id="trackCount">Треков в облаке: 0</div>

    <audio id="audioPlayer" controls playsinline></audio>
    <div class="playlist" id="playlist">Загрузка...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3jhyTjsNMy9cuKFtqPCV9YlGpYlk-FtA",
        authDomain: "sakura-cloud-94eff.firebaseapp.com",
        projectId: "sakura-cloud-94eff",
        storageBucket: "sakura-cloud-94eff.firebasestorage.app",
        messagingSenderId: "204236140147",
        appId: "1:204236140147:web:8af34e5392b2eceead4406"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allTracks = [];
    let currentUrl = "";

    function loadTracks() {
        db.collection("music").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            allTracks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            updateUI();
        });
    }

    function updateUI() {
        let filtered = allTracks.filter(t => t.name.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase()));
        
        const sortType = document.getElementById('sortSelect').value;
        if (sortType === 'az') {
            filtered.sort((a, b) => a.name.localeCompare(b.name));
        } else {
            // Firestore уже отдает в порядке создания, но для надежности:
            filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        }

        document.getElementById('trackCount').innerText = `Треков в облаке: ${allTracks.length}`;
        renderPlaylist(filtered);
    }

    function renderPlaylist(tracks) {
        const container = document.getElementById('playlist');
        container.innerHTML = tracks.length ? '' : '<div style="text-align:center;padding:20px;opacity:0.5">Ничего не найдено...</div>';
        
        tracks.forEach(t => {
            const div = document.createElement('div');
            div.className = 'track' + (currentUrl === t.url ? ' playing' : '');
            div.innerHTML = `
                <div class="track-info"><span>🎵 ${t.name}</span></div>
                <button class="del-btn">✕</button>
            `;

            div.querySelector('.track-info').onclick = () => {
                currentUrl = t.url;
                const player = document.getElementById('audioPlayer');
                player.src = t.url;
                player.load();
                player.play();
                updateUI();
            };

            div.querySelector('.del-btn').onclick = async () => {
                if (confirm(`Удалить "${t.name}"?`)) {
                    await db.collection("music").doc(t.id).delete();
                }
            };
            container.appendChild(div);
        });
    }

    async function addTrack() {
        const name = document.getElementById('trackName').value;
        const url = document.getElementById('trackUrl').value.trim();
        if(!name || !url) return;
        await db.collection("music").add({
            name: name, url: url, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('trackName').value = '';
        document.getElementById('trackUrl').value = '';
    }

    setInterval(() => {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = Math.random() * 8 + 8 + 'px';
        p.style.animationDuration = Math.random() * 2 + 5 + 's';
        document.getElementById('sakura-container').appendChild(p);
        setTimeout(() => p.remove(), 7000);
    }, 800);

    loadTracks();
</script>
</body>
</html>
