<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 SAKURA_CLOUD_V1.7 🌸</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --sakura: #ffb7c5; --white: #fffaff; --text: #7c585e; --active: #ff69b4; }
        .theme-sakura { --bg: #fffaff; --accent: #ffb7c5; --text: #7c585e; --card: #ffffff; --item: #ffb7c5; --viz: #ffb7c5; }
        .theme-void { --bg: #0a0a0a; --accent: #4a4a4a; --text: #e0e0e0; --card: #1a1a1a; --item: #333333; --viz: #888888; }
        .theme-retro { --bg: #c0c0c0; --accent: #000080; --text: #000000; --card: #ffffff; --item: #dfdfdf; --viz: #00ff00; }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .player-card { background: var(--card); width: 95%; max-width: 500px; padding: 25px; border-radius: 35px; border: 4px solid var(--accent); text-align: center; z-index: 10; margin-top: 20px; }
        
        /* Холст для визуализатора */
        #visualizer { width: 100%; height: 100px; border-radius: 15px; background: rgba(0,0,0,0.03); margin: 15px 0; }
        
        .track { background: var(--item); padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .version-tag { position: fixed; top: 10px; left: 10px; font-size: 10px; background: var(--accent); color: white; padding: 3px 8px; border-radius: 10px; }
        .auth-bar { width: 95%; max-width: 500px; display: flex; justify-content: space-between; margin-top: 10px; }
        input { width: 100%; padding: 10px; border: 2px solid var(--accent); border-radius: 15px; margin-bottom: 5px; background: var(--card); color: var(--text); }
        .add-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="theme-sakura">

<div class="version-tag">VER 1.7 (VISUALIZER)</div>
<div id="particles"></div>

<div class="auth-bar">
    <select onchange="document.body.className = this.value; currentTheme = this.value;" style="border-radius:10px; padding:5px;">
        <option value="theme-sakura">🌸 Sakura</option>
        <option value="theme-void">🌑 Void</option>
        <option value="theme-retro">💾 Retro</option>
    </select>
    <button onclick="toggleAuth()" id="authBtn" style="border-radius:10px; padding:5px 15px;">Login</button>
</div>

<div class="player-card">
    <h1 id="headerTitle">SAKURA CLOUD</h1>
    
    <div id="addSection" style="display:none; background:rgba(0,0,0,0.02); padding:15px; border-radius:20px; margin-bottom:15px;">
        <input type="text" id="trackName" placeholder="Название...">
        <input type="text" id="trackUrl" placeholder="MP3 Link...">
        <button class="add-btn" onclick="addTrack()">ОПУБЛИКОВАТЬ</button>
    </div>

    <canvas id="visualizer"></canvas>
    <audio id="audioPlayer" controls crossorigin="anonymous" style="width:100%"></audio>
    
    <div id="playlist" style="text-align:left; max-height:250px; overflow-y:auto; margin-top:20px;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3jhyTjsNMy9cuKFtqPCV9YlGpYlk-FtA",
        authDomain: "sakura-cloud-94eff.firebaseapp.com",
        projectId: "sakura-cloud-94eff",
        storageBucket: "sakura-cloud-94eff.firebasestorage.app",
        messagingSenderId: "204236140147",
        appId: "1:204236140147:web:8af34e5392b2eceead4406"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let audioCtx, analyser, source, canvas, ctx;
    let currentTheme = 'theme-sakura';

    // Инициализация визуализатора
    function initVisualizer() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        
        source = audioCtx.createMediaElementSource(document.getElementById('audioPlayer'));
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 64;
        
        draw();
    }

    function draw() {
        requestAnimationFrame(draw);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const barWidth = (canvas.width / bufferLength) * 2.5;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
            const barHeight = dataArray[i] / 2.5;
            const color = getComputedStyle(document.body).getPropertyValue('--viz');
            ctx.fillStyle = color;
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
            x += barWidth + 2;
        }
    }

    // Музыка и База
    function playTrack(url) {
        initVisualizer();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const p = document.getElementById('audioPlayer');
        p.src = url;
        p.play();
    }

    auth.onAuthStateChanged(user => {
        document.getElementById('addSection').style.display = user ? 'block' : 'none';
        document.getElementById('authBtn').innerText = user ? 'Logout' : 'Login';
        loadTracks();
    });

    async function toggleAuth() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.currentUser ? auth.signOut() : auth.signInWithPopup(provider);
    }

    function loadTracks() {
        db.collection("music").orderBy("createdAt", "desc").onSnapshot(snap => {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            snap.docs.forEach(doc => {
                const t = doc.data();
                const div = document.createElement('div');
                div.className = 'track';
                div.innerHTML = `<div onclick="playTrack('${t.url}')"><b>${t.name}</b></div>`;
                container.appendChild(div);
            });
        });
    }

    async function addTrack() {
        const n = document.getElementById('trackName').value;
        const u = document.getElementById('trackUrl').value;
        if(n && u && auth.currentUser) {
            await db.collection("music").add({
                name: n, url: u, userId: auth.currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }
</script>
</body>
</html>
