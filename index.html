<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_RUNNER_X</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10%; width: 100%; text-align: center; color: #0ff; font-family: 'Arial Black'; font-size: 35px; z-index: 10; pointer-events: none; text-shadow: 0 0 15px #0ff; }
        #best { position: absolute; top: 18%; width: 100%; text-align: center; color: #555; font-family: monospace; font-size: 12px; z-index: 10; }
    </style>
</head>
<body>

<div id="ui">0</div>
<div id="best">BEST: 0</div>

<script>
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT, // Авто-подбор под размер экрана мобилы
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 800,
        height: 450
    },
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 1800 }, debug: false } 
    },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let player, platforms, obstacles, jumpCount = 0;
let score = 0, gameSpeed = 480, nextSpawn = 0;
let bestScore = localStorage.getItem('voidBest') || 0;

function preload() {
    let g = this.make.graphics({x: 0, y: 0, add: false});
    
    // Куб (Игрок)
    g.clear().fillStyle(0x00ffff).fillRect(0, 0, 32, 32);
    g.lineStyle(2, 0xffffff).strokeRect(0, 0, 32, 32);
    g.generateTexture('player', 32, 32);
    
    // Платформа (Столбик)
    g.clear().fillStyle(0x222222).fillRect(0, 0, 100, 200);
    g.lineStyle(2, 0x00ffff).strokeRect(0, 0, 100, 200);
    g.generateTexture('block', 100, 200);
    
    // Шип
    g.clear().fillStyle(0xff0055).fillTriangle(0, 30, 15, 0, 30, 30);
    g.generateTexture('spike', 30, 30);

    // Эффект следа
    g.clear().fillStyle(0x00ffff).fillCircle(2, 2, 2);
    g.generateTexture('trail', 4, 4);
}

function create() {
    document.getElementById('best').innerText = `BEST: ${bestScore}`;
    
    platforms = this.physics.add.group({ allowGravity: false, immovable: true });
    obstacles = this.physics.add.group({ allowGravity: false });

    // Стартовая земля
    createPlatform(0, 400, 1000);

    player = this.physics.add.sprite(150, 200, 'player');
    player.setCollideWorldBounds(true);
    
    // Частицы
    const emitter = this.add.particles(0, 0, 'trail', {
        speed: 100, scale: { start: 1, end: 0 }, lifespan: 500, blendMode: 'ADD'
    });
    emitter.startFollow(player);

    this.physics.add.collider(player, platforms, () => { jumpCount = 0; });
    this.physics.add.overlap(player, obstacles, die, null, this);

    // Управление (Любое нажатие)
    this.input.on('pointerdown', jump, this);
    this.input.keyboard.on('keydown-SPACE', jump, this);
}

function createPlatform(x, y, width = 150) {
    let plat = platforms.create(x, y, 'block');
    plat.setDisplaySize(width, 400); // Делаем столбик
    plat.refreshBody();
    return plat;
}

function spawnLevelChunk() {
    const r = Math.random();
    const x = 900;
    
    if (r < 0.4) {
        // Обычные шипы
        const count = Phaser.Math.Between(1, 3);
        for(let i=0; i<count; i++) {
            let s = obstacles.create(x + (i*35), 370, 'spike');
            s.setVelocityX(-gameSpeed);
        }
    } else if (r < 0.7) {
        // Столбик-паркур
        const h = Phaser.Math.Between(300, 380);
        let p = createPlatform(x, h, 120);
        p.body.velocity.x = -gameSpeed;
        
        // Шип на столбике (для хардкора)
        if(Math.random() > 0.5) {
            let s = obstacles.create(x, h - 215, 'spike');
            s.setVelocityX(-gameSpeed);
        }
    } else {
        // Пропасть (просто ничего не спавним, но увеличиваем дистанцию)
    }
}

function jump() {
    if (jumpCount < 3) {
        player.setVelocityY(-550);
        jumpCount++;
        this.cameras.main.shake(100, 0.005);
    }
}

function update(time) {
    if (time > nextSpawn) {
        spawnLevelChunk.call(this);
        let interval = Phaser.Math.Between(700, 1500) - (score / 15);
        nextSpawn = time + Math.max(550, interval);
    }

    // Удаление объектов за кадром
    [platforms, obstacles].forEach(group => {
        group.getChildren().forEach(obj => {
            if (obj.x < -200) obj.destroy();
        });
    });

    // Падение в пропасть
    if (player.y > 440) die.call(this);

    score += 1;
    gameSpeed += 0.12;
    document.getElementById('ui').innerText = Math.floor(score / 10);
}

function die() {
    this.physics.pause();
    player.setTint(0xff0000);
    this.cameras.main.flash(400, 255, 0, 0);
    
    const finalScore = Math.floor(score / 10);
    if(finalScore > bestScore) localStorage.setItem('voidBest', finalScore);
    
    this.time.delayedCall(800, () => {
        location.reload();
    });
}
</script>
</body>
</html>
