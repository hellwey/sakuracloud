<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_RUNNER_FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10%; width: 100%; text-align: center; color: #0ff; font-family: 'Arial Black'; font-size: 40px; z-index: 10; pointer-events: none; text-shadow: 0 0 15px #0ff; }
    </style>
</head>
<body>

<div id="ui">0</div>

<script>
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 800,
        height: 450
    },
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 2000 }, debug: false } 
    },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let player, platforms, obstacles, jumpCount = 0;
let score = 0, gameSpeed = 450, nextSpawn = 0;

function preload() {
    let g = this.make.graphics({x: 0, y: 0, add: false});
    // Куб
    g.fillStyle(0x00ffff).fillRect(0, 0, 32, 32);
    g.lineStyle(2, 0xffffff).strokeRect(0, 0, 32, 32);
    g.generateTexture('player', 32, 32);
    // Столб
    g.clear().fillStyle(0x111111).fillRect(0, 0, 100, 400);
    g.lineStyle(3, 0x00ffff).strokeRect(0, 0, 100, 400);
    g.generateTexture('block', 100, 400);
    // Шип
    g.clear().fillStyle(0xff0055).fillTriangle(0, 30, 15, 0, 30, 30);
    g.generateTexture('spike', 30, 30);
}

function create() {
    platforms = this.physics.add.group({ allowGravity: false, immovable: true });
    obstacles = this.physics.add.group({ allowGravity: false });

    // Стартовая площадка
    let startPlat = platforms.create(150, 400, 'block');
    startPlat.setDisplaySize(400, 400);
    startPlat.refreshBody();

    player = this.physics.add.sprite(150, 200, 'player');
    player.setCollideWorldBounds(false); // Чтобы не застревал вверху
    
    this.physics.add.collider(player, platforms, () => { 
        if (player.body.touching.down) jumpCount = 0; 
    });
    this.physics.add.overlap(player, obstacles, die, null, this);

    // FIX ДЛЯ ТЕЛЕФОНА: Мгновенный отклик
    this.input.on('pointerdown', (pointer) => {
        jump();
    });
    
    this.input.keyboard.on('keydown-SPACE', jump);
}

function jump() {
    if (jumpCount < 3) { // Тройной прыжок
        player.setVelocityY(-620);
        jumpCount++;
        game.scene.scenes[0].cameras.main.shake(50, 0.005);
    }
}

function spawnChunk() {
    const x = 900;
    const h = Phaser.Math.Between(300, 450); // Разная высота платформ
    const w = Phaser.Math.Between(100, 300); // Разная ширина
    
    let p = platforms.create(x, h, 'block');
    p.setDisplaySize(w, 400);
    p.body.updateFromDisplaySize();
    p.setVelocityX(-gameSpeed);

    // Спавним шипы на платформе
    if (Math.random() > 0.4) {
        let spikeX = x - (w/2) + Math.random() * w;
        let s = obstacles.create(spikeX, h - 215, 'spike');
        s.setVelocityX(-gameSpeed);
    }
}

function update(time) {
    if (time > nextSpawn) {
        spawnChunk();
        let gap = Phaser.Math.Between(1000, 2000) / (gameSpeed / 400);
        nextSpawn = time + gap;
    }

    // Очистка памяти
    [platforms, obstacles].forEach(g => {
        g.getChildren().forEach(o => {
            if (o.x < -200) o.destroy();
        });
    });

    // Если упал
    if (player.y > 600) die.call(this);

    score += 1;
    gameSpeed += 0.05;
    document.getElementById('ui').innerText = Math.floor(score / 10);
}

function die() {
    location.reload();
}
</script>
</body>
</html>
