<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 SAKURA_CLOUD_V1.5 🌸</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --sakura: #ffb7c5; --white: #fffaff; --text: #7c585e; --active: #ff69b4; --delete: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--white); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .version-tag { position: fixed; top: 10px; left: 10px; font-size: 10px; background: var(--active); color: white; padding: 3px 8px; border-radius: 10px; z-index: 100; font-weight: bold; }

        /* Профиль сверху */
        .auth-bar { width: 95%; max-width: 500px; display: flex; justify-content: flex-end; align-items: center; padding: 10px; gap: 10px; margin-top: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--sakura); display: none; }
        .auth-btn { background: white; border: 2px solid var(--sakura); color: var(--text); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }

        .player-card { background: white; width: 95%; max-width: 500px; margin: 10px 0 20px; padding: 25px; border-radius: 35px; border: 4px solid var(--sakura); box-shadow: 0 10px 30px rgba(255,183,197,0.3); text-align: center; position: relative; }

        input, select { width: 100%; padding: 12px; border: 2px solid var(--sakura); border-radius: 15px; margin-bottom: 10px; outline: none; font-size: 16px; background: white; }
        .add-section { background: #fff5f7; padding: 15px; border-radius: 25px; margin-bottom: 20px; border: 1px dashed var(--sakura); display: none; } /* Скрыто до входа */

        .add-btn { background: var(--sakura); color: white; padding: 15px; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; width: 100%; transition: 0.2s; }
        .track { padding: 12px; border-radius: 15px; background: #fffafb; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 2px solid transparent; }
        .track.playing { border-color: var(--active); background: #fff0f5; color: var(--active); font-weight: bold; }
        
        .author-info { font-size: 10px; opacity: 0.6; display: block; margin-top: 2px; }
        .track-info { flex-grow: 1; cursor: pointer; text-align: left; overflow: hidden; }
        .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; display: none; }

        .petal { position: fixed; background: var(--sakura); border-radius: 150% 0 150% 0; z-index: 1; animation: fall linear infinite; opacity: 0.4; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="version-tag">VER 1.5 (AUTH_UPDATE)</div>
<div id="sakura-container"></div>

<div class="auth-bar">
    <img id="userImg" class="user-avatar" src="" alt="avatar">
    <button id="authBtn" class="auth-btn" onclick="toggleAuth()">Войти через Google</button>
</div>

<div class="player-card">
    <h1>🌸 SAKURA CLOUD</h1>
    
    <div id="addSection" class="add-section">
        <input type="text" id="trackName" placeholder="Название трека...">
        <input type="text" id="trackUrl" placeholder="Прямая ссылка (.mp3)...">
        <button class="add-btn" onclick="addTrack()">ОПУБЛИКОВАТЬ ☁️</button>
    </div>

    <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="updateUI()">
    <div id="trackCount" style="font-size: 11px; margin-bottom: 10px; opacity: 0.7;">Загрузка...</div>

    <audio id="audioPlayer" controls playsinline></audio>
    <div class="playlist" id="playlist"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3jhyTjsNMy9cuKFtqPCV9YlGpYlk-FtA",
        authDomain: "sakura-cloud-94eff.firebaseapp.com",
        projectId: "sakura-cloud-94eff",
        storageBucket: "sakura-cloud-94eff.firebasestorage.app",
        messagingSenderId: "204236140147",
        appId: "1:204236140147:web:8af34e5392b2eceead4406"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    let allTracks = [];
    let currentUser = null;

    // Следим за пользователем
    auth.onAuthStateChanged(user => {
        currentUser = user;
        const authBtn = document.getElementById('authBtn');
        const userImg = document.getElementById('userImg');
        const addSection = document.getElementById('addSection');

        if (user) {
            authBtn.innerText = "Выйти";
            userImg.src = user.photoURL;
            userImg.style.display = "block";
            addSection.style.display = "block";
        } else {
            authBtn.innerText = "Войти через Google";
            userImg.style.display = "none";
            addSection.style.display = "none";
        }
        updateUI();
    });

    async function toggleAuth() {
        if (currentUser) {
            await auth.signOut();
        } else {
            await auth.signInWithPopup(provider);
        }
    }

    function loadTracks() {
        db.collection("music").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            allTracks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            updateUI();
        });
    }

    function updateUI() {
        let filtered = allTracks.filter(t => t.name.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase()));
        document.getElementById('trackCount').innerText = `Треков в облаке: ${allTracks.length}`;
        renderPlaylist(filtered);
    }

    function renderPlaylist(tracks) {
        const container = document.getElementById('playlist');
        container.innerHTML = tracks.length ? '' : 'Тут пусто...';
        
        tracks.forEach(t => {
            const isOwner = currentUser && t.userId === currentUser.uid;
            const div = document.createElement('div');
            div.className = 'track' + (document.getElementById('audioPlayer').src === t.url ? ' playing' : '');
            
            div.innerHTML = `
                <div class="track-info">
                    <span>🎵 ${t.name}</span>
                    <span class="author-info">залил: ${t.userName || 'Аноним'}</span>
                </div>
                ${isOwner ? '<button class="del-btn" style="display:block">✕</button>' : ''}
            `;

            div.querySelector('.track-info').onclick = () => {
                const player = document.getElementById('audioPlayer');
                player.src = t.url;
                player.play();
                updateUI();
            };

            if (isOwner) {
                div.querySelector('.del-btn').onclick = async () => {
                    if (confirm("Удалить свой трек?")) await db.collection("music").doc(t.id).delete();
                };
            }
            container.appendChild(div);
        });
    }

    async function addTrack() {
        const name = document.getElementById('trackName').value;
        const url = document.getElementById('trackUrl').value.trim();
        if(!name || !url || !currentUser) return;
        
        await db.collection("music").add({
            name: name,
            url: url,
            userId: currentUser.uid,
            userName: currentUser.displayName,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        document.getElementById('trackName').value = '';
        document.getElementById('trackUrl').value = '';
    }

    loadTracks();
    // (Анимация сакуры остается такой же)
</script>
</body>
</html>
