<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 SAKURA_CLOUD_LITE 🌸</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --sakura: #ffb7c5; --white: #fffaff; --text: #7c585e; }
        body { background: var(--white); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .player-card { background: white; width: 90%; max-width: 500px; margin-top: 30px; padding: 30px; border-radius: 40px; border: 4px solid var(--sakura); box-shadow: 0 15px 40px rgba(255,183,197,0.4); text-align: center; z-index: 10; position: relative; }
        input { width: 100%; padding: 12px; border: 2px solid var(--sakura); border-radius: 20px; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        .add-btn { background: var(--sakura); color: white; padding: 12px 25px; border-radius: 50px; cursor: pointer; border:none; font-weight: bold; width: 100%; transition: 0.3s; }
        .add-btn:hover { background: #ff69b4; }
        audio { width: 100%; margin: 15px 0; }
        .playlist { width: 100%; max-height: 300px; overflow-y: auto; text-align: left; margin-top: 20px; }
        .track { padding: 10px 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; border-radius: 10px; background: #fffafb; margin-bottom: 5px; }
        .petal { position: fixed; background: var(--sakura); border-radius: 150% 0 150% 0; z-index: 1; animation: fall linear infinite; opacity: 0.5; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

<div id="sakura-container"></div>

<div class="player-card">
    <h1>🌸 SAKURA CLOUD</h1>
    
    <input type="text" id="searchInput" placeholder="🔍 Поиск трека..." oninput="filterTracks()">
    
    <div style="background: #fff0f5; padding: 15px; border-radius: 20px; margin-bottom: 20px;">
        <input type="text" id="trackName" placeholder="Название трека...">
        <input type="text" id="trackUrl" placeholder="Ссылка на .mp3 файл...">
        <button class="add-btn" onclick="addTrack()">ДОБАВИТЬ В ОБЛАКО ☁️</button>
    </div>

    <audio id="audioPlayer" controls></audio>
    <div class="playlist" id="playlist">Загрузка...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3jhyTjsNMy9cuKFtqPCV9YlGpYlk-FtA",
        authDomain: "sakura-cloud-94eff.firebaseapp.com",
        projectId: "sakura-cloud-94eff",
        storageBucket: "sakura-cloud-94eff.firebasestorage.app",
        messagingSenderId: "204236140147",
        appId: "1:204236140147:web:8af34e5392b2eceead4406"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allTracks = [];

    // Получаем треки из базы
    function loadTracks() {
        db.collection("music").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            allTracks = snapshot.docs.map(doc => doc.data());
            renderPlaylist(allTracks);
        });
    }

    function renderPlaylist(tracks) {
        const container = document.getElementById('playlist');
        container.innerHTML = tracks.length ? '' : 'Пока пусто...';
        tracks.forEach(t => {
            const div = document.createElement('div');
            div.className = 'track';
            div.innerHTML = `<span>🎵 ${t.name}</span> <small>PLAY</small>`;
            div.onclick = () => {
                document.getElementById('audioPlayer').src = t.url;
                document.getElementById('audioPlayer').play();
            };
            container.appendChild(div);
        });
    }

    function filterTracks() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderPlaylist(allTracks.filter(t => t.name.toLowerCase().includes(q)));
    }

    // Добавляем новый трек
    async function addTrack() {
        const name = document.getElementById('trackName').value;
        const url = document.getElementById('trackUrl').value;
        
        if(!name || !url) return alert("Заполни все поля!");

        await db.collection("music").add({
            name: name,
            url: url,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        document.getElementById('trackName').value = '';
        document.getElementById('trackUrl').value = '';
    }

    // Сакура
    setInterval(() => {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = Math.random() * 10 + 10 + 'px';
        p.style.animationDuration = Math.random() * 3 + 4 + 's';
        document.getElementById('sakura-container').appendChild(p);
        setTimeout(() => p.remove(), 6000);
    }, 400);

    loadTracks();
</script>
</body>
</html>
