<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_RUNNER_BEST</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; color: #0ff; font-family: 'Arial Black'; font-size: 45px; z-index: 10; pointer-events: none; text-shadow: 0 0 15px #0ff; }
        #best-ui { position: absolute; top: 15%; width: 100%; text-align: center; color: rgba(0, 255, 255, 0.5); font-family: monospace; font-size: 16px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
<div id="ui">0</div>
<div id="best-ui">BEST: 0</div>
<script>
const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 450 },
    physics: { default: 'arcade', arcade: { gravity: { y: 2200 } } },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let player, platforms, obstacles, score = 0, gameSpeed = 500, nextSpawn = 0, jumpCount = 0;
let bestScore = localStorage.getItem('voidRunnerBest') || 0;

function preload() {
    let g = this.make.graphics({x: 0, y: 0, add: false});
    g.fillStyle(0x00ffff).fillRect(0, 0, 32, 32).lineStyle(2, 0xffffff).strokeRect(0, 0, 32, 32).generateTexture('player', 32, 32);
    g.clear().fillStyle(0x111111).fillRect(0, 0, 100, 400).lineStyle(3, 0x00ffff).strokeRect(0, 0, 100, 400).generateTexture('block', 100, 400);
    g.clear().fillStyle(0xff0055).fillTriangle(0, 30, 15, 0, 30, 30).generateTexture('spike', 30, 30);
}

function create() {
    document.getElementById('best-ui').innerText = `BEST: ${bestScore}`;
    platforms = this.physics.add.group({ allowGravity: false, immovable: true });
    obstacles = this.physics.add.group({ allowGravity: false });

    let start = platforms.create(150, 400, 'block');
    start.setDisplaySize(500, 400); start.refreshBody();

    player = this.physics.add.sprite(150, 200, 'player');
    this.physics.add.collider(player, platforms, () => { if(player.body.touching.down) jumpCount = 0; });
    this.physics.add.overlap(player, obstacles, handleDie, null, this);

    this.input.on('pointerdown', jump);
    this.input.keyboard.on('keydown-SPACE', jump);
}

function jump() {
    if (jumpCount < 3) {
        player.setVelocityY(-650);
        jumpCount++;
    }
}

function update(time) {
    if (time > nextSpawn) {
        const x = 900;
        const h = Phaser.Math.Between(320, 460);
        const w = Phaser.Math.Between(130, 350);
        
        let p = platforms.create(x, h, 'block');
        p.setDisplaySize(w, 400); p.body.updateFromDisplaySize();
        p.setVelocityX(-gameSpeed);

        if (Math.random() > 0.45) {
            let s = obstacles.create(x + Phaser.Math.Between(-w/4, w/4), h - 215, 'spike');
            s.setVelocityX(-gameSpeed);
        }
        nextSpawn = time + Phaser.Math.Between(800, 1600) / (gameSpeed/500);
    }

    platforms.getChildren().forEach(p => { if(p.x < -200) p.destroy(); });
    obstacles.getChildren().forEach(o => { if(o.x < -200) o.destroy(); });

    if (player.y > 500) handleDie();

    score += 1;
    gameSpeed += 0.045;
    document.getElementById('ui').innerText = Math.floor(score / 10);
}

function handleDie() {
    let finalScore = Math.floor(score / 10);
    if (finalScore > bestScore) {
        localStorage.setItem('voidRunnerBest', finalScore);
    }
    location.reload();
}
</script>
</body>
</html>
