<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_SLOTS_RUNNER</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: #0ff; z-index: 10; pointer-events: none; }
        #slot-btn { position: absolute; bottom: 20px; right: 20px; width: 100px; height: 100px; background: #ff0; border-radius: 50%; border: 5px solid #fff; display: flex; justify-content: center; align-items: center; color: #000; font-size: 14px; font-weight: bold; box-shadow: 0 0 20px #ff0; cursor: pointer; }
        #status { position: absolute; top: 80px; width: 100%; text-align: center; color: #fff; font-size: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">SCORE: 0</div>
    <div id="coins">💰: 0</div>
    <div id="best">BEST: 0</div>
</div>
<div id="status">READY TO DEPOSIT?</div>
<div id="slot-btn" onclick="spinSlots()">DEPOSIT<br>10 COINS</div>

<script>
const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 450 },
    physics: { default: 'arcade', arcade: { gravity: { y: 2200 } } },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let player, platforms, obstacles, coins, score = 0, coinCount = 0, gameSpeed = 500, nextSpawn = 0, jumpCount = 0;
let bestScore = localStorage.getItem('voidCasinoBest') || 0;
let isInvulnerable = false;

function preload() {
    let g = this.make.graphics({x: 0, y: 0, add: false});
    g.fillStyle(0x00ffff).fillRect(0, 0, 32, 32).generateTexture('player', 32, 32);
    g.clear().fillStyle(0x111111).fillRect(0, 0, 100, 400).generateTexture('block', 100, 400);
    g.clear().fillStyle(0xff0055).fillTriangle(0, 30, 15, 0, 30, 30).generateTexture('spike', 30, 30);
    g.clear().fillStyle(0xffff00).fillCircle(10, 10, 10).generateTexture('coin', 20, 20);
}

function create() {
    document.getElementById('best').innerText = `BEST: ${bestScore}`;
    platforms = this.physics.add.group({ allowGravity: false, immovable: true });
    obstacles = this.physics.add.group({ allowGravity: false });
    coins = this.physics.add.group({ allowGravity: false });

    platforms.create(150, 400, 'block').setDisplaySize(500, 400).refreshBody();

    player = this.physics.add.sprite(150, 200, 'player');
    this.physics.add.collider(player, platforms, () => { if(player.body.touching.down) jumpCount = 0; });
    this.physics.add.overlap(player, obstacles, () => { if(!isInvulnerable) location.reload(); });
    this.physics.add.overlap(player, coins, collectCoin, null, this);

    this.input.on('pointerdown', (p) => { if(p.x < 600) jump(); });
}

function jump() { if (jumpCount < 3) { player.setVelocityY(-650); jumpCount++; } }

function collectCoin(p, c) { c.destroy(); coinCount++; updateUI(); }

function spinSlots() {
    if (coinCount < 10) return;
    coinCount -= 10;
    updateUI();
    
    const results = ['JACKPOT', 'SLOWMO', 'SHIELD', 'SCAM'];
    const res = results[Math.floor(Math.random() * results.length)];
    document.getElementById('status').innerText = "ROLLING... " + res;

    if (res === 'JACKPOT') score += 10000;
    if (res === 'SHIELD') { isInvulnerable = true; player.setAlpha(0.5); setTimeout(() => { isInvulnerable = false; player.setAlpha(1); }, 5000); }
    if (res === 'SLOWMO') { gameSpeed -= 200; setTimeout(() => { gameSpeed += 200; }, 5000); }
    if (res === 'SCAM') { gameSpeed += 300; }
}

function update(time) {
    if (time > nextSpawn) {
        const x = 900, h = Phaser.Math.Between(320, 460), w = Phaser.Math.Between(150, 400);
        let p = platforms.create(x, h, 'block');
        p.setDisplaySize(w, 400); p.body.updateFromDisplaySize(); p.setVelocityX(-gameSpeed);

        if (Math.random() > 0.5) {
            let s = obstacles.create(x + Phaser.Math.Between(-w/3, w/3), h - 215, 'spike');
            s.setVelocityX(-gameSpeed);
        }
        if (Math.random() > 0.3) {
            let c = coins.create(x + Phaser.Math.Between(-w/3, w/3), h - 230, 'coin');
            c.setVelocityX(-gameSpeed);
        }
        nextSpawn = time + Phaser.Math.Between(800, 1500) / (gameSpeed/500);
    }
    
    platforms.getChildren().forEach(o => { if(o.x < -200) o.destroy(); });
    obstacles.getChildren().forEach(o => { if(o.x < -200) o.destroy(); });
    coins.getChildren().forEach(o => { if(o.x < -200) o.destroy(); });

    if (player.y > 500) { handleDie(); }
    score += 1; gameSpeed += 0.03; updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = `SCORE: ${Math.floor(score/10)}`;
    document.getElementById('coins').innerText = `💰: ${coinCount}`;
}

function handleDie() {
    if (Math.floor(score/10) > bestScore) localStorage.setItem('voidCasinoBest', Math.floor(score/10));
    location.reload();
}
</script>
</body>
</html>
