<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON_RIDER_SCHOOL_EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #score-ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #0ff; font-family: 'Arial Black'; font-size: 40px; z-index: 10; pointer-events: none; text-shadow: 0 0 10px #0ff; }
        #best-ui { position: absolute; top: 70px; width: 100%; text-align: center; color: #f0f; font-family: monospace; font-size: 18px; z-index: 10; }
    </style>
</head>
<body>

<div id="score-ui">0</div>
<div id="best-ui">BEST: 0</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800, height: 600,
    backgroundColor: '#050505',
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let player, ground, cursors;
let score = 0, bestScore = localStorage.getItem('riderBest') || 0;
let points = [], nextX = 0;
let isRotating = false;

function preload() {
    let g = this.make.graphics({x: 0, y: 0, add: false});
    // Мотик (простой прямоугольник для физики)
    g.fillStyle(0x00ffff).fillRect(0, 0, 40, 15);
    g.generateTexture('bike', 40, 15);
}

function create() {
    document.getElementById('best-ui').innerText = `BEST: ${bestScore}`;
    
    // Игрок (наш "байк")
    player = this.physics.add.sprite(100, 100, 'bike');
    player.setCollideWorldBounds(false);
    player.setDragX(100);
    player.setMaxVelocity(600, 1000);

    // Начальная трасса
    ground = this.add.graphics();
    for(let i=0; i<20; i++) addSegment();

    // Камера
    this.cameras.main.startFollow(player, true, 0.1, 0.1, -200, 100);
    this.cameras.main.setZoom(0.8);

    cursors = this.input.keyboard.createCursorKeys();
    this.input.on('pointerdown', () => isRotating = true);
    this.input.on('pointerup', () => isRotating = false);
}

function addSegment() {
    let prevY = points.length > 0 ? points[points.length-1].y : 500;
    let newY = prevY + (Math.random() * 200 - 100);
    newY = Phaser.Math.Clamp(newY, 300, 580);
    
    // Создаем "трамплин" или "яму"
    if(Math.random() > 0.8) nextX += 150; // Прыжок
    
    points.push({ x: nextX, y: newY });
    nextX += 120;
}

function update() {
    // Газ
    player.setVelocityX(350);

    // Трюки (Флипы)
    if (cursors.space.isDown || isRotating) {
        player.setAngularVelocity(300);
        score += 1; // Очки за кручение
    } else {
        player.setAngularVelocity(0);
    }

    // Рисуем бесконечную трассу
    drawGround.call(this);

    // Проверка падения (если байк перевернулся или улетел вниз)
    if (player.angle > 150 || player.angle < -150) {
        // Упрощенная проверка столкновения "головой"
        checkGameOver();
    }
    
    if (player.y > 800) checkGameOver();

    // Генерация новых кусков трассы
    if (player.x > nextX - 1000) addSegment();

    // Обновление счета
    score += Math.floor(player.body.velocity.x / 100);
    document.getElementById('score-ui').innerText = Math.floor(score/10);
}

function drawGround() {
    ground.clear();
    const hue = (Math.floor(score/500) * 40) % 360;
    ground.lineStyle(6, Phaser.Display.Color.HSLToColor(hue/360, 1, 0.5).color);

    ground.beginPath();
    ground.moveTo(points[0].x, points[0].y);
    
    for(let i = 1; i < points.length; i++) {
        ground.lineTo(points[i].x, points[i].y);
        
        // Проверка приземления (упрощенная)
        if (Math.abs(player.x - points[i].x) < 20) {
            if (player.y > points[i].y - 20) {
                player.y = points[i].y - 20;
                player.setVelocityY(0);
                player.setAngle(Phaser.Math.RadToDeg(Math.atan2(points[i].y - points[i-1].y, points[i].x - points[i-1].x)));
            }
        }
    }
    ground.strokePath();
}

function checkGameOver() {
    if(Math.floor(score/10) > bestScore) {
        localStorage.setItem('riderBest', Math.floor(score/10));
    }
    location.reload();
}
</script>
</body>
</html>
