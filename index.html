<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_RUNNER_BETA</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(255,255,255,0.1); background: #111; max-width: 100%; max-height: 80vh; }
        .stats { margin-bottom: 10px; font-size: 18px; color: #ff4d4d; }
        .controls { margin-top: 10px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="stats">HP: <span id="hp">3</span> | ROOM: <span id="room">1</span></div>
<canvas id="gameCanvas" width="600" height="400"></canvas>
<div class="controls">WASD - Move | ARROWS - Shoot</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hpDisplay = document.getElementById('hp');
    const roomDisplay = document.getElementById('room');

    let player = { x: 300, y: 200, size: 20, hp: 3, speed: 4 };
    let bullets = [];
    let enemies = [];
    let currentRoom = 1;
    let keys = {};

    // Управление
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function spawnEnemies() {
        enemies = [];
        for(let i = 0; i < currentRoom + 2; i++) {
            enemies.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                size: 15,
                hp: 2,
                speed: 1 + (currentRoom * 0.1)
            });
        }
    }

    function update() {
        // Движение игрока
        if (keys['KeyW'] && player.y > player.size) player.y -= player.speed;
        if (keys['KeyS'] && player.y < canvas.height - player.size) player.y += player.speed;
        if (keys['KeyA'] && player.x > player.size) player.x -= player.speed;
        if (keys['KeyD'] && player.x < canvas.width - player.size) player.x += player.speed;

        // Стрельба (Стрелочки)
        if (keys['ArrowUp']) shoot(0, -5);
        if (keys['ArrowDown']) shoot(0, 5);
        if (keys['ArrowLeft']) shoot(-5, 0);
        if (keys['ArrowRight']) shoot(5, 0);

        // Пули
        bullets.forEach((b, i) => {
            b.x += b.vx;
            b.y += b.vy;
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
            
            // Попадание во врагов
            enemies.forEach((en, ei) => {
                let dist = Math.hypot(b.x - en.x, b.y - en.y);
                if (dist < en.size) {
                    en.hp--;
                    bullets.splice(i, 1);
                    if (en.hp <= 0) enemies.splice(ei, 1);
                }
            });
        });

        // Враги (преследование)
        enemies.forEach(en => {
            let dx = player.x - en.x;
            let dy = player.y - en.y;
            let angle = Math.atan2(dy, dx);
            en.x += Math.cos(angle) * en.speed;
            en.y += Math.sin(angle) * en.speed;

            // Урон игроку
            if (Math.hypot(player.x - en.x, player.y - en.y) < player.size) {
                player.hp -= 0.01; // Плавное падение HP
                hpDisplay.innerText = Math.ceil(player.hp);
                if (player.hp <= 0) location.reload();
            }
        });

        // Переход в новую комнату
        if (enemies.length === 0) {
            currentRoom++;
            roomDisplay.innerText = currentRoom;
            player.x = 300; player.y = 200;
            spawnEnemies();
        }
    }

    function shoot(vx, vy) {
        if (Date.now() - (player.lastShot || 0) < 250) return;
        bullets.push({ x: player.x, y: player.y, vx, vy });
        player.lastShot = Date.now();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Игрок (Голова)
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
        ctx.fill();

        // Пули
        ctx.fillStyle = '#00ffff';
        bullets.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
        });

        // Враги
        ctx.fillStyle = '#ff4d4d';
        enemies.forEach(en => {
            ctx.beginPath(); ctx.arc(en.x, en.y, en.size, 0, Math.PI*2); ctx.fill();
        });

        update();
        requestAnimationFrame(draw);
    }

    spawnEnemies();
    draw();
</script>
</body>
</html>
