<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOLF OF WALL STREET SIM</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; color: #0f0; }
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .stat { position: absolute; background: rgba(0,0,0,0.8); padding: 5px 10px; border: 1px solid #0f0; }
        #balance-ui { top: 10px; left: 10px; font-size: 20px; color: #fff; }
        #rate-ui { top: 10px; right: 10px; font-size: 24px; font-weight: bold; }
        #leaderboard { top: 60px; right: 10px; font-size: 12px; color: #888; text-align: right; }
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: auto; }
        .btn { padding: 20px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border: 3px solid #fff; border-radius: 10px; color: white; }
        #buy-btn { background: #008800; }
        #sell-btn { background: #880000; }
        #upgrade-btn { background: #444; position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="balance-ui" class="stat">CASH: $1000<br>ASSETS: 0.00$</div>
    <div id="rate-ui" class="stat">RATE: 75.00 ₽</div>
    <div id="leaderboard" class="stat">TOP WOLVES:<br>1. ELON - $1M<br>2. YOU - $0</div>
</div>

<div id="controls">
    <div id="buy-btn" class="btn" onclick="buyAsset()">BUY (ALL)</div>
    <div id="upgrade-btn" class="btn" onclick="upgrade()">UPGRADE ($500)</div>
    <div id="sell-btn" class="btn" onclick="sellAsset()">SELL (ALL)</div>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 450 },
    backgroundColor: '#050505',
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let cash = 1000, assets = 0, currentRate = 75.0, history = [], graph, upgradeLevel = 1;
let bestBalance = localStorage.getItem('wolfBest') || 0;

function preload() {}

function create() {
    graph = this.add.graphics();
    updateLeaderboard();
    
    // Цикл изменения курса
    this.time.addEvent({
        delay: 500,
        callback: updateRate,
        callbackScope: this,
        loop: true
    });
}

function updateRate() {
    // Рандомный курс с шансом обвала
    let volatility = 0.5 + (upgradeLevel * 0.1);
    let change = (Math.random() - 0.48) * volatility; 
    
    // Шанс КРАХА (Black Swan)
    if(Math.random() > 0.98) {
        change = -currentRate * 0.4; // Рухнул на 40%
        this.cameras.main.shake(500, 0.01);
    }
    
    currentRate = Math.max(1, currentRate + change);
    history.push(currentRate);
    if(history.length > 50) history.shift();
    
    updateUI();
}

function buyAsset() {
    if(cash > 0) {
        assets += cash / currentRate;
        cash = 0;
        updateUI();
    }
}

function sellAsset() {
    if(assets > 0) {
        cash += assets * currentRate;
        assets = 0;
        if(cash > bestBalance) {
            bestBalance = Math.floor(cash);
            localStorage.setItem('wolfBest', bestBalance);
            updateLeaderboard();
        }
        updateUI();
    }
}

function upgrade() {
    if(cash >= 500) {
        cash -= 500;
        upgradeLevel++;
        updateUI();
    }
}

function updateUI() {
    document.getElementById('balance-ui').innerHTML = `CASH: $${Math.floor(cash)}<br>ASSETS: ${assets.toFixed(2)} unit`;
    document.getElementById('rate-ui').innerText = `RATE: ${currentRate.toFixed(2)} ₽`;
    document.getElementById('rate-ui').style.color = currentRate > (history[history.length-2] || 0) ? '#0f0' : '#f00';
}

function updateLeaderboard() {
    document.getElementById('leaderboard').innerHTML = `TOP WOLVES:<br>1. LEGEND - $100,000<br>2. YOU - $${Math.floor(bestBalance)}`;
}

function update() {
    graph.clear();
    graph.lineStyle(3, 0x00ff00, 1);
    graph.beginPath();
    
    let step = 800 / 50;
    history.forEach((rate, i) => {
        let y = 350 - (rate * 2); // Масштабируем график
        if(i === 0) graph.moveTo(i * step, y);
        else graph.lineTo(i * step, y);
    });
    graph.strokePath();
}
</script>
</body>
</html>
