<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON_RUNNER_PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui { position: absolute; top: 20px; color: #fff; font-family: 'Arial Black'; font-size: 40px; z-index: 10; pointer-events: none; text-shadow: 0 0 20px #ff00ff; }
    </style>
</head>
<body>

<div id="ui">0</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800, height: 400,
    backgroundColor: '#050505',
    physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, debug: false } },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let player, platforms, obstacles, cursors, emitter;
let score = 0, gameSpeed = 400, canDoubleJump = false;

function preload() {
    let g = this.make.graphics({x: 0, y: 0, add: false});
    
    // Игрок (светящийся куб)
    g.fillStyle(0x00ffff).fillRect(0, 0, 30, 30);
    g.generateTexture('player', 30, 30);
    
    // Земля
    g.clear().fillStyle(0x333333).fillRect(0, 0, 800, 50);
    g.generateTexture('ground', 800, 50);
    
    // Шип (препятствие)
    g.clear().fillStyle(0xff0055);
    g.fillTriangle(0, 30, 15, 0, 30, 30);
    g.generateTexture('spike', 30, 30);

    // Партиклы
    g.clear().fillStyle(0x00ffff).fillCircle(2, 2, 2);
    g.generateTexture('dot', 4, 4);
}

function create() {
    // Земля (статичная группа)
    platforms = this.physics.add.staticGroup();
    platforms.create(400, 380, 'ground').refreshBody();

    // Игрок
    player = this.physics.add.sprite(100, 300, 'player');
    player.setCollideWorldBounds(true);
    
    // Частицы за игроком
    emitter = this.add.particles(0, 0, 'dot', {
        speed: 100, scale: { start: 1, end: 0 }, lifespan: 400, blendMode: 'ADD'
    });
    emitter.startFollow(player);

    // Группа препятствий
    obstacles = this.physics.add.group();

    // Коллизии
    this.physics.add.collider(player, platforms);
    this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

    // Управление
    cursors = this.input.keyboard.createCursorKeys();
    this.input.on('pointerdown', jump, this);

    // Таймер спавна шипов
    this.spawnTimer = this.time.addEvent({
        delay: 1500, callback: spawnSpike, callbackScope: this, loop: true
    });
}

function spawnSpike() {
    let spike = obstacles.create(900, 340, 'spike');
    spike.setVelocityX(-gameSpeed);
    spike.body.setAllowGravity(false);
}

function jump() {
    if (player.body.touching.down) {
        player.setVelocityY(-550);
        canDoubleJump = true;
    } else if (canDoubleJump) {
        player.setVelocityY(-450);
        canDoubleJump = false;
        this.cameras.main.shake(100, 0.01); // Тряска при дабл-джампе
    }
}

function update() {
    if (cursors.space.isDown && player.body.touching.down) jump.call(this);

    // Удаление улетевших шипов
    obstacles.getChildren().forEach(spike => {
        if (spike.x < -50) spike.destroy();
    });

    // Увеличение сложности
    score += 1;
    gameSpeed += 0.1;
    document.getElementById('ui').innerText = Math.floor(score / 10);
    
    // Ускоряем спавн
    this.spawnTimer.delay = Math.max(600, 1500 - (score / 50));
}

function hitObstacle() {
    this.physics.pause();
    player.setTint(0xff0000);
    this.cameras.main.flash(500, 255, 0, 0);
    
    setTimeout(() => {
        location.reload();
    }, 1000);
}
</script>
</body>
</html>
